<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="Программа Полины Акимовой «Формула безопасной сушки»">
  <title>Формула безопасной сушки — Полина Акимова</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page" id="top">
    <section class="section hero" id="hero">
      <div class="hero__image-wrap">
        <img id="heroImage" class="hero__image" src="assets/images/hero/polina.jpg" alt="Полина Акимова">
      </div>
      <div class="hero__content card">
        <p class="badge" id="heroBadge"></p>
        <h1 id="heroTitle"></h1>
        <p id="heroSubtitle"></p>
        <a class="btn btn--primary" href="#tariffs" id="heroButton"></a>
      </div>
    </section>

    <section class="section card" id="recognition">
      <h2 id="recognitionTitle"></h2>
      <ul class="list" id="recognitionList"></ul>
    </section>

    <section class="section card" id="solution">
      <h2 id="solutionTitle"></h2>
      <p class="section__lead" id="solutionLead"></p>
      <ul class="list" id="solutionList"></ul>
    </section>

    <section class="section" id="inside">
      <h2 id="insideTitle"></h2>
      <div class="grid-cards" id="insideCards"></div>
    </section>

    <section class="section card" id="outcome">
      <h2 id="outcomeTitle"></h2>
      <ul class="list" id="outcomeList"></ul>
    </section>

    <section class="section" id="social-proof">
      <h2 id="socialProofTitle"></h2>

      <div class="proof-block card">
        <h3 id="reviewsTitle"></h3>
        <div class="gallery" id="reviewsGallery"></div>
      </div>

      <div class="proof-block card">
        <h3 id="resultsTitle"></h3>
        <div class="gallery" id="resultsGallery"></div>
      </div>

      <div class="proof-block card">
        <h3 id="beforeAfterTitle"></h3>
        <div class="gallery" id="beforeAfterGallery"></div>
      </div>
    </section>

    <section class="section" id="tariffs">
      <h2 id="tariffsTitle"></h2>
      <div class="tariff-list" id="tariffList"></div>
    </section>

    <section class="section" id="faq">
      <h2 id="faqTitle"></h2>
      <div class="accordion" id="faqAccordion"></div>
    </section>

    <section class="section card final-cta" id="final-cta">
      <h2 id="finalCtaTitle"></h2>
      <p id="finalCtaText"></p>
      <div class="final-cta__actions" id="finalCtaActions"></div>
      <a class="btn btn--secondary" id="telegramButton" href="#" target="_blank" rel="noopener noreferrer"></a>
    </section>
  </main>

  <a class="sticky-btn" href="#tariffs" id="stickyTariffButton"></a>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
